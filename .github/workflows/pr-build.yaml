# Builds and deploys pull requests to the Dev environment when the PR has the `build` label.
# Trigger conditions:
# - `build` label is added to a PR targeting `main`
# - subsequent commits to that PR while the `build` label remains

name: PR Build

on:
  # pull_request_target is required so this workflow can access repository secrets.
  pull_request_target:
    types: [labeled, synchronize]
    branches:
      - main

permissions:
  contents: read

env:
  TOOLS_NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE_PLATE }}-tools
  DEV_NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE_PLATE }}-dev
  PR_NUMBER: ${{ github.event.pull_request.number }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Validate PR Build Trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      pr_ref: ${{ steps.gate.outputs.pr_ref }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - name: Evaluate trigger conditions
        id: gate
        run: |
          SHOULD_RUN=false

          if [ "${{ github.event.pull_request.base.ref }}" != "main" ]; then
            SHOULD_RUN=false
          elif [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "build" ]; then
            SHOULD_RUN=true
          elif [ "${{ github.event.action }}" = "synchronize" ] && [ "${{ contains(github.event.pull_request.labels.*.name, 'build') }}" = "true" ]; then
            SHOULD_RUN=true
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "pr_ref=refs/pull/${{ github.event.pull_request.number }}/head" >> "$GITHUB_OUTPUT"
          echo "version=pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Show gate result
        run: |
          echo "should_run=${{ steps.gate.outputs.should_run }}"
          echo "pr_ref=${{ steps.gate.outputs.pr_ref }}"
          echo "version=${{ steps.gate.outputs.version }}"

  verify-pr-author:
    name: Verify PR Author
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify author is allowed to run PR build
        uses: actions/github-script@v7
        with:
          script: |
            const allowedAuthors = [
              'kuanfandevops',
              'emi-hi',
              'JulianForeman',
              'tim738745',
              'dallascrichmond',
              'dependabot[bot]'
            ];
            const prAuthor = context.payload.pull_request.user.login;
            if (!allowedAuthors.includes(prAuthor)) {
              throw new Error(`PR author ${prAuthor} is not allowed to run PR build.`);
            }

  install-oc:
    name: Install OpenShift CLI
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    uses: ./.github/workflows/install-oc-template.yaml

  build-pr:
    name: Build Zeva2 PR Images
    needs: [gate, verify-pr-author, install-oc]
    if: needs.gate.outputs.should_run == 'true'
    uses: ./.github/workflows/build-template.yaml
    with:
      git_ref: ${{ needs.gate.outputs.pr_ref }}
      version: ${{ needs.gate.outputs.version }}
    secrets:
      tools-namespace: ${{ secrets.OPENSHIFT_NAMESPACE_PLATE }}-tools
      openshift-server: ${{ secrets.OPENSHIFT_SERVER }}
      openshift-token: ${{ secrets.OPENSHIFT_TOKEN }}

  report-skip:
    name: Report Skipped Build
    needs: gate
    if: needs.gate.outputs.should_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        run: |
          echo "PR build skipped."
          echo "Action: ${{ github.event.action }}"
          echo "Base branch: ${{ github.event.pull_request.base.ref }}"
          echo "Current labels: ${{ join(github.event.pull_request.labels.*.name, ', ') }}"
          echo "Expected: labeled(build) or synchronize with build label on PRs targeting main."

  tag-images:
    name: Tag Zeva2 images to Dev
    needs: [gate, build-pr]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Restore oc command from Cache
        uses: actions/cache@v5.0.4
        with:
          path: /usr/local/bin/oc
          key: oc-cli-${{ runner.os }}

      - name: Log in to Openshift
        uses: redhat-actions/oc-login@v1.3
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.TOOLS_NAMESPACE }}

      - name: Tag images to target namespace
        run: |
          echo "VERSION=${{ needs.gate.outputs.version }}"
          oc tag ${{ env.TOOLS_NAMESPACE }}/zeva2-next:${{ needs.gate.outputs.version }} ${{ env.DEV_NAMESPACE }}/zeva2-next:${{ needs.gate.outputs.version }}
          oc tag ${{ env.TOOLS_NAMESPACE }}/zeva2-bullmq:${{ needs.gate.outputs.version }} ${{ env.DEV_NAMESPACE }}/zeva2-bullmq:${{ needs.gate.outputs.version }}

  deploy:
    name: Deploy pull request
    needs: [gate, tag-images]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Manifest repository
        uses: actions/checkout@v6.0.2
        with:
          repository: bcgov-c/tenant-gitops-ea8eab
          ref: main
          ssh-key: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}

      - name: Update values in next values-dev-pr.yaml
        uses: mikefarah/yq@v4.40.5
        with:
          cmd: |
            yq -i '.image.tag = "${{ needs.gate.outputs.version }}"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i '.route.host = "zeva2-dev-${{ env.PR_NUMBER }}.apps.silver.devops.gov.bc.ca"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="AUTH_URL").value) = "https://zeva2-dev-${{ env.PR_NUMBER }}.apps.silver.devops.gov.bc.ca/api/auth"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="REDIS_HOST").value) = "zeva2-redis-dev-${{ env.PR_NUMBER }}-master.${{ env.DEV_NAMESPACE }}.svc.cluster.local"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="DATABASE_URL").value) = "postgresql://test:test@zeva2-postgresql-dev-${{ env.PR_NUMBER }}.${{ env.DEV_NAMESPACE }}.svc.cluster.local:5432/zeva?schema=public"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i eval '(.env[] | select(.name == "MINIO_ACCESS_KEY") | .valueFrom.secretKeyRef.name) = "zeva2-minio-dev-${{ env.PR_NUMBER }}"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="MINIO_ENDPOINT").value) = "zeva2-minio-dev-${{ env.PR_NUMBER }}.ea8eab-dev.svc.cluster.local"' zeva2/zeva2-next/values-dev-pr.yaml
            yq -i eval '(.env[] | select(.name == "MINIO_SECRET_KEY") | .valueFrom.secretKeyRef.name) = "zeva2-minio-dev-${{ env.PR_NUMBER }}"' zeva2/zeva2-next/values-dev-pr.yaml

      - name: Update values in bullmq values-dev-pr.yaml
        uses: mikefarah/yq@v4.40.5
        with:
          cmd: |
            yq -i '.image.tag = "${{ needs.gate.outputs.version }}"' zeva2/zeva2-bullmq/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="REDIS_HOST").value) = "zeva2-redis-dev-${{ env.PR_NUMBER }}-master.ea8eab-dev.svc.cluster.local"' zeva2/zeva2-bullmq/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="DATABASE_URL").value) = "postgresql://test:test@zeva2-postgresql-dev-${{ env.PR_NUMBER }}.${{ env.DEV_NAMESPACE }}.svc.cluster.local:5432/zeva?schema=public"' zeva2/zeva2-bullmq/values-dev-pr.yaml
            yq -i eval '(.env[] | select(.name == "MINIO_ACCESS_KEY") | .valueFrom.secretKeyRef.name) = "zeva2-minio-dev-${{ env.PR_NUMBER }}"' zeva2/zeva2-bullmq/values-dev-pr.yaml
            yq -i '(.env[] | select(.name=="MINIO_ENDPOINT").value) = "zeva2-minio-dev-${{ env.PR_NUMBER }}.ea8eab-dev.svc.cluster.local"' zeva2/zeva2-bullmq/values-dev-pr.yaml
            yq -i eval '(.env[] | select(.name == "MINIO_SECRET_KEY") | .valueFrom.secretKeyRef.name) = "zeva2-minio-dev-${{ env.PR_NUMBER }}"' zeva2/zeva2-bullmq/values-dev-pr.yaml

      - name: Restore oc command from Cache
        uses: actions/cache@v5.0.4
        with:
          path: /usr/local/bin/oc
          key: oc-cli-${{ runner.os }}

      - name: Log in to Openshift
        uses: redhat-actions/oc-login@v1.3
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ env.DEV_NAMESPACE }}

      - name: Deploy zeva2 apps
        run: |
          cd services/postgres-pr
          helm -n ${{ env.DEV_NAMESPACE }} -f ./values-dev-pr.yaml upgrade --install zeva2-postgresql-dev-${{ env.PR_NUMBER }} oci://registry-1.docker.io/bitnamicharts/postgresql --version 16.2.0
          cd ../redis
          helm -n ${{ env.DEV_NAMESPACE }} -f ./values-dev-pr.yaml upgrade --install zeva2-redis-dev-${{ env.PR_NUMBER }} oci://registry-1.docker.io/bitnamicharts/redis --version 21.2.9
          cd ../minio-pr
          helm -n ${{ env.DEV_NAMESPACE }} -f ./values-dev-pr.yaml upgrade --install zeva2-minio-dev-${{ env.PR_NUMBER }} oci://registry-1.docker.io/bitnamicharts/minio --version 14.8.0
          cd ../../zeva2/zeva2-next
          helm -n ${{ env.DEV_NAMESPACE }} -f ./values-dev-pr.yaml upgrade --install zeva2-next-dev-${{ env.PR_NUMBER }} .
          cd ../zeva2-bullmq
          helm -n ${{ env.DEV_NAMESPACE }} -f ./values-dev-pr.yaml upgrade --install zeva2-bullmq-dev-${{ env.PR_NUMBER }} .
